<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar RecisCare</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
  <div class="container">
    <div class="card">
      <img src="../assets/logo.png" alt="RecisCare Logo" class="logo logo-large logo-center">
      <h1>Daftar Akun</h1>
      <p>Pendaftaran dinonaktifkan dalam demo portfolio.</p>
      <p>Silakan pilih peran demo dari halaman masuk.</p>
      <button onclick="window.location.href='../index.html'">Kembali ke Menu Utama</button>
      <div style="text-align:center;">
        <a href="../index.html" class="text-link">Sudah punya akun? Masuk</a>
      </div>
    </div>

    <footer>RecisCare — Sistem Piket Sekolah • Portfolio Demo</footer>
  </div>

  <script src="../demo/demo-data.js"></script>
  <script src="../assets/js/demo-store.js"></script>
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      DemoStore.settings.setTheme(isDark ? 'dark' : 'light');
      updateToggleButton();
    }

    function updateToggleButton() {
      const btn = document.querySelector('.dark-mode-toggle');
      btn.innerHTML = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    applyTheme();
    updateToggleButton();
  </script>
</body>

</html>
