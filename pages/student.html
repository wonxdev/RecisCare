<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecisCare — Siswa</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
  <div id="toast-container" class="notification-container"></div>

  <div class="container">
    <img src="../assets/logo.png" alt="RecisCare Logo" class="logo logo-small">
    <div class="card" style="background: linear-gradient(135deg, #6ee7b7 0%, #34d399 100%); color: white; border:none;">
      <h2 style="color:white; margin-bottom:8px;">Halo, <span id="userName">Siswa</span>!</h2>
      <p style="color: #d1fae5; margin-bottom:16px;" id="userClass">...</p>

      <div style="display:flex; gap:16px;">
        <div style="background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:12px; flex:1;">
          <small style="display:block; opacity:0.8;">Jadwal Piket</small>
          <div style="font-weight:700; font-size:1.1rem;" id="piketDay">...</div>
        </div>
        <div style="background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:12px; flex:1;">
          <small style="display:block; opacity:0.8;">Peringatan</small>
          <div style="font-weight:700; font-size:1.1rem;" id="warningCount">0/3</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Upload Bukti Piket</h3>
      <span class="status-text">Pastikan foto terlihat jelas. Bukti disimpan lokal dalam demo.</span>

      <div class="file-input-wrapper">
        <button class="btn-upload" type="button">
          <span style="font-size:32px">📷</span>
          <span>Ambil Foto / Pilih File</span>
        </button>
        <input type="file" id="photo" accept="image/*" capture="environment" onchange="previewFile()">
      </div>

      <div id="preview" style="display:none; margin-top:16px;">
        <p style="margin-bottom:8px; font-size:0.875rem;">File terpilih:</p>
        <div style="font-weight:600;" id="filename"></div>
        <img id="previewImg" style="width:100%; border-radius:12px; margin-top:8px; display:none;">
      </div>

      <button onclick="submit()">Kirim Bukti</button>
    </div>

    <div class="card">
      <h3>Tugas & Penugasan</h3>
      <div id="assignmentList">Memuat tugas...</div>
    </div>

    <h3>Riwayat & Jadwal</h3>
    <div id="scheduleList">
      <p style="text-align:center;">Memuat jadwal...</p>
    </div>

    <button class="secondary" onclick="logoutPage()" style="margin-top:auto;">Keluar</button>

    <footer>RecisCare — Sistem Piket Sekolah</footer>
  </div>

  <script src="../js/app.js"></script>
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      database.settings.setTheme(isDark ? 'dark' : 'light');
      updateToggleButton();
    }

    function updateToggleButton() {
      const btn = document.querySelector('.dark-mode-toggle');
      if (document.body.classList.contains('dark')) {
        btn.innerHTML = '☀️ Light Mode';
      } else {
        btn.innerHTML = '🌙 Dark Mode';
      }
    }

    let user = null;

    function init() {
      const activeUser = checkAuth('student');
      if (!activeUser) return;
      user = activeUser;
      document.getElementById('userName').innerText = user.name || user.email.split('@')[0];
      document.getElementById('userClass').innerText = user.class || 'Kelas Tidak Ada';
      document.getElementById('piketDay').innerText = user.piket_day || '-';
      loadScheduleAndWarnings();
      loadAssignments();
    }

    function loadScheduleAndWarnings() {
      const history = database.attendance.getAll().filter((entry) => entry.user_id === user.id);
      const targetDay = user.piket_day;
      const dayMap = { 'Minggu': 0, 'Senin': 1, 'Selasa': 2, 'Rabu': 3, 'Kamis': 4, 'Jumat': 5, 'Sabtu': 6 };
      const targetIndex = dayMap[targetDay];
      if (targetIndex === undefined) return;

      const list = [];
      let warnings = 0;
      const now = new Date();
      now.setHours(0, 0, 0, 0);

      for (let i = 0; i < 5; i++) {
        const d = new Date();
        d.setDate(d.getDate() - (i * 7));
        const currentDay = d.getDay();
        const diff = targetIndex - currentDay;
        d.setDate(d.getDate() + diff);
        d.setHours(0, 0, 0, 0);

        const match = history.find((entry) => new Date(entry.created_at).toDateString() === d.toDateString());
        let status = 'missed';
        if (match) {
          status = match.status;
        } else if (d.getTime() === now.getTime()) {
          status = 'upcoming';
        }
        if (status === 'missed' || status === 'absent') warnings++;
        list.push({ date: d, status, match });
      }

      const warningEl = document.getElementById('warningCount');
      warningEl.innerText = `${warnings}/3`;
      if (warnings >= 3) warningEl.style.color = '#f87171';

      const html = list.map((item) => {
        const dateStr = item.date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        let badgeClass = '';
        let label = '';
        switch (item.status) {
          case 'present': badgeClass = 'present'; label = 'Hadir'; break;
          case 'absent': badgeClass = 'absent'; label = 'Ditolak'; break;
          case 'pending': badgeClass = 'pending'; label = 'Menunggu'; break;
          case 'missed': badgeClass = 'missed'; label = 'Terlewat'; break;
          case 'upcoming': badgeClass = 'pending'; label = 'Jadwal Hari Ini'; break;
        }
        return `<div class="card" style="padding:16px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;"><div><div style="font-weight:600;">${dateStr}</div>${item.match && item.match.note ? `<small style="color:var(--danger-text)">Output Guru: ${item.match.note}</small>` : ''}</div><span class="badge ${badgeClass}">${label}</span></div>`;
      }).join('');

      document.getElementById('scheduleList').innerHTML = html;
    }

    function loadAssignments() {
      const assignments = database.assignments.getForStudent(user.id);
      const html = assignments.map((assignment) => {
        const status = database.assignmentStatus.get(assignment.id, user.id);
        const currentStatus = status ? status.status : 'pending';
        return `<div class="card" style="padding:16px; margin-bottom:12px;"><div style="display:flex; justify-content:space-between; align-items:flex-start;"><div><div style="font-weight:700;">${assignment.title}</div><small style="color:var(--text-muted);">${assignment.subject} • ${formatDate(assignment.due_date)}</small></div><span class="badge pending">${assignment.priority}</span></div><p>${assignment.description}</p><div class="actions"><button class="success" onclick="setAssignmentStatus('${assignment.id}', 'completed')">Selesai</button><button class="secondary" onclick="setAssignmentStatus('${assignment.id}', 'in_progress')">Proses</button><button class="danger" onclick="setAssignmentStatus('${assignment.id}', 'pending')">Tunda</button></div><div style="margin-top:8px; color:var(--text-muted);">Status saat ini: <strong>${currentStatus}</strong></div></div>`;
      }).join('');
      document.getElementById('assignmentList').innerHTML = html || '<div style="text-align:center; color:var(--text-muted);">Tidak ada tugas untuk Anda.</div>';
    }

    function setAssignmentStatus(assignmentId, status) {
      database.assignmentStatus.set(assignmentId, user.id, status);
      loadAssignments();
    }

    function previewFile() {
      const file = document.getElementById('photo').files[0];
      if (file) {
        document.getElementById('preview').style.display = 'block';
        document.getElementById('filename').innerText = file.name;
        const img = document.getElementById('previewImg');
        img.style.display = 'block';
        img.src = URL.createObjectURL(file);
      }
    }

    function submit() {
      const fileInput = document.getElementById('photo');
      if (!fileInput.files[0]) return alert('Pilih foto terlebih dahulu!');
      const btn = document.querySelector('button[onclick="submit()"]');
      btn.innerText = 'Mengirim...';
      btn.disabled = true;
      database.attendance.markPresent(user.id, { status: 'pending', photo_name: fileInput.files[0].name });
      alert('Laporan piket berhasil dikirim!');
      btn.innerText = 'Kirim Bukti';
      btn.disabled = false;
      loadScheduleAndWarnings();
    }

    function logoutPage() {
      logout();
    }

    applyTheme();
    init();
  </script>
</body>

</html>
