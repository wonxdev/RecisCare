<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1116">
  <title>RecisCare — Siswa</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">
        <img src="../assets/logo.png" alt="RecisCare Logo">
        <span>RecisCare</span>
      </a>
      <div class="navbar-actions">
        <span class="navbar-user" id="navUser"></span>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Keluar</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>Halo, <span id="userName">Siswa</span></h1>
      <p id="userClass">...</p>
    </header>

    <div class="stat-grid">
      <div class="stat">
        <span class="stat-label">Jadwal Piket</span>
        <div class="stat-value" id="piketDay">...</div>
      </div>
      <div class="stat">
        <span class="stat-label">Peringatan</span>
        <div class="stat-value" id="warningCount">0/3</div>
      </div>
    </div>

    <div class="card">
      <h3>Upload Bukti Piket</h3>
      <span class="card-hint">Pastikan foto terlihat jelas. Bukti disimpan lokal dalam demo.</span>

      <div class="dropzone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
        <span>Ambil Foto / Pilih File</span>
        <input type="file" id="photo" accept="image/*" capture="environment" aria-label="Pilih foto bukti piket">
      </div>

      <div id="preview" class="upload-preview" hidden>
        <div class="filename" id="filename"></div>
        <img id="previewImg" alt="Pratinjau bukti piket" hidden>
      </div>

      <div class="actions">
        <button class="btn btn-primary btn-block" id="submitBtn">Kirim Bukti</button>
      </div>
    </div>

    <section>
      <h2 class="section-title">Riwayat &amp; Jadwal</h2>
      <div id="scheduleList" style="margin-top:16px;">
        <div class="empty-state">Memuat jadwal...</div>
      </div>
    </section>
  </main>

  <footer>RecisCare — Sistem Piket Sekolah • Portfolio Demo</footer>

  <script src="../demo/demo-data.js"></script>
  <script src="../assets/js/demo-store.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/pages/student.js"></script>
</body>

</html>
