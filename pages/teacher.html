<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1116">
  <title>RecisCare — Guru</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">
        <img src="../assets/logo.png" alt="RecisCare Logo">
        <span>RecisCare</span>
      </a>
      <div class="navbar-actions">
        <span class="navbar-user" id="navUser"></span>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Keluar</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1 id="pageTitle">Dashboard</h1>
      <p id="pageSubtitle">Memuat akses demo...</p>
    </header>

    <div class="toolbar">
      <select id="dayFilter" aria-label="Filter hari piket">
        <option value="all">Semua Hari</option>
        <option value="Senin">Senin</option>
        <option value="Selasa">Selasa</option>
        <option value="Rabu">Rabu</option>
        <option value="Kamis">Kamis</option>
        <option value="Jumat">Jumat</option>
      </select>
      <button class="btn btn-secondary" id="exportBtn">Export CSV</button>
    </div>

    <div id="rolePanel"></div>

    <section>
      <h2 class="section-title">Laporan Piket</h2>
      <div id="list" style="margin-top:16px;">
        <div class="empty-state">Memuat data...</div>
      </div>
    </section>
  </main>

  <footer>RecisCare — Sistem Piket Sekolah • Portfolio Demo</footer>

  <script src="../demo/demo-data.js"></script>
  <script src="../assets/js/demo-store.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/pages/teacher.js"></script>
