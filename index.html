<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1116">
  <title>Masuk — RecisCare</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <main class="auth-layout">
    <div class="auth-card">
      <img src="assets/logo.png" alt="RecisCare Logo" class="brand-mark">
      <h1>Masuk ke RecisCare</h1>
      <p>Pilih peran demo untuk menjelajahi aplikasi.</p>

      <div class="field">
        <label for="roleSelect">Peran Demo</label>
        <select id="roleSelect">
          <option value="admin">Administrator</option>
          <option value="teacher">Teacher</option>
          <option value="classleader">Class Leader</option>
          <option value="student">Student</option>
        </select>
      </div>

      <button class="btn btn-primary btn-block" id="loginBtn">Lanjutkan</button>

      <div class="auth-links">
        <a href="pages/register.html">Daftar dinonaktifkan dalam demo</a>
        <a href="#" id="resetLink">Reset Data Demo</a>
      </div>
    </div>
  </main>

  <footer>RecisCare — Sistem Piket Sekolah • Portfolio Demo</footer>

  <script src="demo/demo-data.js"></script>
  <script src="assets/js/demo-store.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/pages/login.js"></script>
</body>

</html>
