<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk RecisCare</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
  <div class="container">
    <div class="card">
      <span class="badge pending" style="display:inline-block; margin-bottom:12px;">🧪 Portfolio Demo</span>
      <img src="assets/logo.png" alt="RecisCare Logo" class="logo logo-large logo-center">
      <h1>Masuk RecisCare</h1>
      <p>Silakan pilih peran demo untuk melanjutkan.</p>

      <label>Peran Demo</label>
      <select id="roleSelect">
        <option value="admin">Administrator</option>
        <option value="teacher">Teacher</option>
        <option value="classleader">Class Leader</option>
        <option value="student">Student</option>
      </select>

      <button onclick="login()">Lanjutkan</button>

      <div style="text-align:center;">
        <a href="pages/register.html" class="text-link">Daftar dinonaktifkan dalam demo</a>
      </div>
      <div style="text-align:center; margin-top:8px;">
        <a href="#" class="text-link" onclick="resetDemo(); return false;">Reset Data Demo</a>
      </div>
    </div>

    <footer>RecisCare — Sistem Piket Sekolah • Portfolio Demo</footer>
  </div>

  <script src="demo/demo-data.js"></script>
  <script src="assets/js/demo-store.js"></script>
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      DemoStore.settings.setTheme(isDark ? 'dark' : 'light');
      updateToggleButton();
    }

    function updateToggleButton() {
      const btn = document.querySelector('.dark-mode-toggle');
      btn.innerHTML = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    function login() {
      const role = document.getElementById('roleSelect').value;
      enterDemo(role);
    }

    applyTheme();
    updateToggleButton();
  </script>
  <script src="../assets/js/app.js"></script>
</body>

</html>
